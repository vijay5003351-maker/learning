services:
  backend_service:
    build: ./backend
    container_name: backend-container
    restart: always
    env_file: 
      - ./backend/.env
    ports: 
      - "3000:3000"


  frontend:
      build:
        context: ./frontend
        args:
          VITE_API_URL: http://3.26.242.54:5000/api
      container name: frontend
      restart: always
      ports:
        - "5173:5173"
      depends on:
        - backend